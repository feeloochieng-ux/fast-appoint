<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>patient's-fast-appoint</title>
<link rel="stylesheet" href="patient`s.css">
</head>
<body>
    <div class="page1">
      <fieldset>
        <legend class="field"><strong>Personal Info.</strong></legend>
        <div class="emerge">
          <div class="names">
            <label for="name">Full Name :</label>
            <input type="text" placeholder=" Patient's first name" id="name" />
            <input type="text" placeholder=" Patient's last name" id="name1" />
          </div>
          <br />
          <div class="names">
            <div>
              <label for="number">Phone Number :</label>
              <input
                type="number"
                placeholder="enter valid phone-number"
                id="number"
              />
            </div>
            <div>
              <label for="address">email Address :</label>
              <input
                type="email"
                placeholder="enter valid email address"
                id="address"
              />
            </div>
          </div>
          <br />
          <div class="names">
            <div>
              <label for="Who">Who are you seeking HELP for : </label>
              <input type="text" placeholder="relationship" id="Who" />
            </div>
            <label for="date">Prefered DATE for the appointment :</label>
            <input type="date" id="date" />
          </div>
          <div>
            <br />
            <div>
              <label for="area">Briefly expain CONDITION of patient : </label>
              <textarea id="area"></textarea>
            </div>
          </div>
          <div class="btn">
            <button class="btn-submit">SUBMIT</button>
          </div>
        </div>
      </fieldset>
    </div>
    <script src="patient`s.js"></script>
    <script src="js/book.js"></script>
</body>
</html>
